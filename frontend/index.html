<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3-Tier App Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
  h1 { color: #333; }
  input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
  button { background: #007bff; color: white; border: none; cursor: pointer; }
  ul { list-style: none; padding: 0; }
  li { background: #f4f4f4; margin: 5px 0; padding: 10px; border-radius: 5px; }
</style>
</head>
<body>
  <h1>3-Tier App Dashboard</h1>
  <form id="itemForm">
    <input type="text" id="itemName" placeholder="Enter item name" required>
    <button type="submit">Add Item</button>
  </form>
  <h2>Items</h2>
  <ul id="itemList"></ul>

<script>
  const API_URL = "http://iafs-backend-env.eba-4bdmkf8s.ap-south-1.elasticbeanstalk.com";

  async function loadItems() {
    const res = await fetch(`${API_URL}/api/items`);
    const items = await res.json();
    const list = document.getElementById('itemList');
    list.innerHTML = '';
    items.forEach(item => {
      const li = document.createElement('li');
      li.textContent = item.name;
      list.appendChild(li);
    });
  }

  document.getElementById('itemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('itemName').value;
    await fetch(`${API_URL}/api/items`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    document.getElementById('itemName').value = '';
    loadItems();
  });

  loadItems();
</script>
</body>
</html>
